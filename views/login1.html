<body>

<div class="main">

<div class="container">

    <div class="brand">
        <img class="logo" src="views/logo.png" alt="Smart Municipality">
    </div>

    <form id="signupForm" data-form="signup" novalidate action="index.php?route=signup" method="post">

        <div class="avatar">
            <img src="views/admin.jpeg" alt="Photo admin">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="prenom">Prénom</label>
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M12 12a4 4 0 1 0-4-4a4 4 0 0 0 4 4m0 2c-4.42 0-8 2-8 4.5V21h16v-2.5c0-2.5-3.58-4.5-8-4.5"/>
                    </svg>
                    <input id="prenom" name="prenom" type="text" placeholder="Prénom">
                </div>
                <div class="error-message" id="error-prenom"></div>
            </div>

            <div class="form-group">
                <label for="nom">Nom</label>
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M12 12a4 4 0 1 0-4-4a4 4 0 0 0 4 4m0 2c-4.42 0-8 2-8 4.5V21h16v-2.5c0-2.5-3.58-4.5-8-4.5"/>
                    </svg>
                    <input id="nom" name="nom" type="text" placeholder="Nom">
                </div>
                <div class="error-message" id="error-nom"></div>
            </div>
        </div>

        <label for="email">Email</label>
        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M20 8l-8 5l-8-5V6l8 5l8-5m0-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2"/>
            </svg>
            <input id="email" name="email" type="text" placeholder="Email">
        </div>
        <div class="error-message" id="error-email"></div>

        <label for="motdepasse">Mot de passe</label>
        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M12 17a2 2 0 0 0 2-2a2 2 0 0 0-2-2a2 2 0 0 0-2 2a2 2 0 0 0 2 2m6-6h-1V9a5 5 0 0 0-10 0v2H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2m-3 0H9V9a3 3 0 0 1 6 0z"/>
            </svg>
            <input id="motdepasse" name="motdepasse" type="password" placeholder="Mot de passe">
        </div>
        <div class="error-message" id="error-motdepasse"></div>

        <label for="confirmMotdepasse">Confirmer mot de passe</label>
        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M12 17a2 2 0 0 0 2-2a2 2 0 0 0-2-2a2 2 0 0 0-2 2a2 2 0 0 0 2 2m6-6h-1V9a5 5 0 0 0-10 0v2H6a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2m-3 0H9V9a3 3 0 0 1 6 0z"/>
            </svg>
            <input id="confirmMotdepasse" name="confirmMotdepasse" type="password" placeholder="Confirmer mot de passe">
        </div>
        <div class="error-message" id="error-confirmMotdepasse"></div>

        <button type="submit">Créer un compte</button>

        <a href="index.php?route=login">Déjà un compte ? Se connecter</a>

    </form>

</div>
